<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privilege Housekeeping</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background-color: #faf6ef;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 60px;
    font-family: 'Lato', sans-serif;
    position: relative;
    overflow-x: hidden;
  }

  .bg-dots {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, rgba(196,169,107,0.18) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .bg-circles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .bg-circles svg { width: min(110vw, 900px); height: min(110vw, 900px); opacity: 0.55; }
  .bg-corner-tl, .bg-corner-br { position: fixed; pointer-events: none; z-index: 0; }
  .bg-corner-tl { top: -20px; left: -20px; width: 260px; opacity: 0.55; }
  .bg-corner-br { bottom: -20px; right: -20px; width: 260px; opacity: 0.55; transform: rotate(180deg); }

  .card {
    width: 100%; max-width: 460px;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
  }

  .logo-wrap { width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .logo-wrap img { width: 150px; height: 150px; object-fit: contain; }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px; font-weight: 600; color: #2a1f0e;
    letter-spacing: 4px; text-transform: uppercase;
    margin-top: 6px; text-align: center;
  }
  .brand-sub {
    font-size: 11px; font-weight: 300; color: #c4a96b;
    letter-spacing: 5px; text-transform: uppercase;
    margin-top: 5px; margin-bottom: 12px; text-align: center;
  }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; width: 200px; }
  .divider-line { flex: 1; height: 0.5px; background: linear-gradient(90deg, transparent, #c4a96b); }
  .divider-line.right { background: linear-gradient(90deg, #c4a96b, transparent); }
  .divider-diamond { width: 6px; height: 6px; background: #c4a96b; transform: rotate(45deg); flex-shrink: 0; }

  /*  кнопки  */
  .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.85);
    border: 1.5px solid transparent;
    border-radius: 14px;
    padding: 15px 20px;
    text-decoration: none;
    color: #2a1f0e;
    transition: all 0.25s ease;
    backdrop-filter: blur(6px);
    position: relative;
  }

  .link-btn:hover {
    background: rgba(255,255,255,0.97);
    transform: translateY(-2px);
  }
  .link-btn:active { transform: translateY(0); }

  /* цветная обводка при наведений */
  .btn-website:hover   { border-color: #1a73e8; box-shadow: 0 6px 24px rgba(26,115,232,0.15); }
  .btn-whatsapp:hover  { border-color: #25d366; box-shadow: 0 6px 24px rgba(37,211,102,0.18); }
  .btn-instagram:hover { border-color: #833ab4; box-shadow: 0 6px 24px rgba(131,58,180,0.18); }
  .btn-line:hover      { border-color: #00b900; box-shadow: 0 6px 24px rgba(0,185,0,0.15); }
  .btn-reviews:hover   { border-color: #f4c430; box-shadow: 0 6px 24px rgba(244,196,48,0.22); }

  .icon {
    width: 40px; height: 40px; object-fit: contain; flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .link-btn:hover .icon { transform: scale(1.1) rotate(-4deg); }

  .link-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 400;
    letter-spacing: 0.6px; flex: 1;
    color: #2a1f0e;
    transition: color 0.25s ease;
  }
  .link-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 4px;
    background: #c4a96b; border-radius: 50%;
    margin-right: 10px; vertical-align: middle;
    opacity: 0.7; transition: opacity 0.2s, transform 0.2s;
  }
  .link-btn:hover .link-title::before { opacity: 1; transform: scale(1.4); }

  .btn-website:hover   .link-title { color: #1a73e8; }
  .btn-whatsapp:hover  .link-title { color: #1a9944; }
  .btn-instagram:hover .link-title { color: #833ab4; }
  .btn-line:hover      .link-title { color: #008a0a; }
  .btn-reviews:hover   .link-title { color: #a07800; }

  .arrow {
    color: #c4a96b; font-size: 22px; font-weight: 300;
    opacity: 0.45; line-height: 1;
    transition: opacity 0.2s, transform 0.2s;
  }
  .link-btn:hover .arrow { opacity: 1; transform: translateX(3px); }

  @media (max-width: 480px) {
    body { padding: 36px 14px 48px; }
    .logo-wrap, .logo-wrap img { width: 130px; height: 130px; }
    .brand-name { font-size: 26px; }
    .link-btn { padding: 13px 16px; gap: 12px; }
    .icon { width: 34px; height: 34px; }
    .bg-corner-tl, .bg-corner-br { width: 180px; }
  }
</style>
</head>
